name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip1
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build example modules (wasm32-wasip1)
        run: cargo build --release --target wasm32-wasip1 -p policy-module -p scripted-module
      - name: Build
        run: cargo build --release
      - name: Test
        run: cargo test --workspace

  rust-cuda:
    name: Rust (CUDA build, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build with CUDA feature
        run: cargo build --release --features cuda -p kelvane-runtime

  python:
    name: kelvane-marl (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kelvane-marl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install numpy torch --index-url https://download.pytorch.org/whl/cpu
          pip install gymnasium pettingzoo onnx onnxruntime pytest
      - name: Pytest
        run: pytest -q
