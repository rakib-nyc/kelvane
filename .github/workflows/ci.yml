name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip1
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build example modules (wasm32-wasip1)
        run: cargo build --release --target wasm32-wasip1 -p policy-module -p scripted-module
      - name: Build
        run: cargo build --release
      - name: Test
        run: cargo test --workspace

  rust-cuda:
    # Build-only, best-effort: the runner has no GPU, so this compiles the CUDA
    # backend (it does not run it) and is allowed to fail without blocking CI.
    name: Rust (CUDA build-only, best-effort, no GPU)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install OpenSSL build deps
        # `ort` downloads ONNX Runtime over TLS at build time (pulls in
        # openssl-sys). ubuntu-latest ships these, but install explicitly so the
        # job is self-documenting and resilient to runner-image changes.
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Build with CUDA feature (compile only, no GPU run)
        run: cargo build --release --features cuda -p kelvane-runtime

  python:
    name: kelvane-marl (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kelvane-marl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        # Install the package itself (editable) plus its onnx/dev extras, with
        # torch resolved from the CPU wheel index (fast, no CUDA). Installing the
        # package is what makes `import kelvane_marl` work under pytest.
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu \
                      --extra-index-url https://pypi.org/simple \
                      -e '.[onnx,dev]'
      - name: Pytest
        run: pytest -q
